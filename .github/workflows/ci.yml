name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint shell scripts
        run: |
          bash -n nanogram.sh
          bash -n src/scripts/ci_smoke_test.sh

      - name: Run smoke test
        run: ./src/scripts/ci_smoke_test.sh
